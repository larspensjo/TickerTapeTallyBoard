[package]
name = "ticker-tape-tally-board-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8"
log = "0.4"
serde = { version = "1", features = ["derive"] }
simplelog = "0.12"
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread", "signal"] }
tower-http = { version = "0.6", features = ["cors"] }

[dev-dependencies]
serde_json = "1"
tower = { version = "0.5", features = ["util"] }
